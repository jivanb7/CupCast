# CupCast Deploy Pipeline
# Triggers on: push to main (after PR merge).
# Builds Docker images, pushes to GCP Artifact Registry, deploys to Cloud Run.
#
# Production topology:
#   - Supabase Postgres (managed) ← backend connects via DATABASE_URL
#   - FastAPI backend on Cloud Run
#   - React + Nginx frontend on Cloud Run (container listens on 8080)
#   - MLflow tracking server on GCP VM (set MLFLOW_TRACKING_URI secret)
#
# Required GitHub secrets:
#   GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#   DATABASE_URL                  — Supabase Postgres connection string
#   ADMIN_API_KEY                 — protects POST /api/v1/admin/*
#   MLFLOW_TRACKING_URI           — https://<caddy-host>  (Cloud Run loads models via this)
#   MLFLOW_TRACKING_USERNAME      — basic auth user for Caddy-fronted MLflow
#   MLFLOW_TRACKING_PASSWORD      — basic auth password
#   API_FOOTBALL_KEYS             — comma-separated api-sports.io keys
#   FOOTBALL_DATA_ORG_API_KEY     — Football-Data.org free-tier key
#   GCS_BUCKET                    — bucket holding trained model artifacts (read by runtime SA)
#   VITE_API_URL                  — public backend URL baked into the frontend build

name: Deploy

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-west1
  ARTIFACT_REGISTRY: us-west1-docker.pkg.dev
  BACKEND_SERVICE: cupcast-backend
  FRONTEND_SERVICE: cupcast-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP using Workload Identity Federation (no long-lived keys)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      # ──────────────────────────────────────────────────────────────────
      # SCHEMA MIGRATIONS (must run BEFORE deploying the new backend code).
      # Migrations are additive-only by convention, so applying them while
      # the OLD revision is still serving traffic is safe — the old code
      # ignores new columns/tables, the new code requires them present.
      # If this step fails, the deploy aborts and prod stays on the old
      # revision (no broken state).
      # ──────────────────────────────────────────────────────────────────
      - name: Set up Python for Alembic
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply Alembic migrations to production DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          pip install --quiet -r requirements.txt
          echo "Current alembic revision (before upgrade):"
          alembic current || echo "(no version stamped yet — first run)"
          echo ""
          echo "Migrations to apply:"
          alembic heads
          echo ""
          alembic upgrade head
          echo ""
          echo "Final alembic revision:"
          alembic current

      # Backend build context is the repo root so the Dockerfile can COPY ml/
      # alongside backend/. The -f flag selects the Dockerfile.
      - name: Build and push backend image
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cupcast/${{ env.BACKEND_SERVICE }}:${{ github.sha }}"
          docker build -f backend/Dockerfile -t $IMAGE .
          docker push $IMAGE
          echo "BACKEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build and push frontend image
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cupcast/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}"
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -f frontend/Dockerfile -t $IMAGE frontend/
          docker push $IMAGE
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      # Capture the current backend revision BEFORE deploying so we can
      # roll back if the post-deploy smoke test fails. First-deploy edge
      # case (no prior revision): PREVIOUS_REVISION ends up empty and
      # rollback is skipped.
      - name: Capture previous backend revision (for rollback safety)
        run: |
          PREV=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.latestReadyRevisionName)' 2>/dev/null || echo "")
          echo "PREVIOUS_BACKEND_REVISION=$PREV" >> $GITHUB_ENV
          echo "Previous backend revision (rollback target): $PREV"

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image ${{ env.BACKEND_IMAGE }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=production \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --set-env-vars ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }} \
            --set-env-vars MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }} \
            --set-env-vars MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }} \
            --set-env-vars MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }} \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars GCS_BUCKET=${{ secrets.GCS_BUCKET }} \
            --set-env-vars API_FOOTBALL_KEYS=${{ secrets.API_FOOTBALL_KEYS }} \
            --set-env-vars FOOTBALL_DATA_ORG_API_KEY=${{ secrets.FOOTBALL_DATA_ORG_API_KEY }} \
            --set-env-vars ENABLE_SCHEDULER=false \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.FRONTEND_IMAGE }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 2

      # ──────────────────────────────────────────────────────────────────
      # SMOKE TEST — hits real endpoints that touch the new schema. The
      # old /health check passed even when migrations were missing because
      # /health doesn't query any tables. These checks would have caught
      # the Apr 24 outage (column matches.stage does not exist).
      # ──────────────────────────────────────────────────────────────────
      - name: Smoke test backend (real endpoints)
        id: smoke
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          echo "Smoke testing $BACKEND_URL"
          set -e
          # /health — basic process liveness
          curl -sf -o /dev/null --max-time 10 "${BACKEND_URL}/health"
          # /api/v1/matches/upcoming — exercises matches+predictions+teams
          # joins + the new stage/group_label/country_code columns
          curl -sf -o /dev/null --max-time 15 "${BACKEND_URL}/api/v1/matches/upcoming?days_ahead=7"
          # /api/v1/world-cup/overview — exercises the new WC router +
          # team_elo + tournament_simulations tables
          curl -sf -o /dev/null --max-time 15 "${BACKEND_URL}/api/v1/world-cup/overview"
          # /api/v1/world-cup/groups — exercises group_standings +
          # qualification_status + projected-from-elo logic
          curl -sf -o /dev/null --max-time 15 "${BACKEND_URL}/api/v1/world-cup/groups"
          echo "All smoke checks passed."

      # ──────────────────────────────────────────────────────────────────
      # AUTO-ROLLBACK on smoke failure. If any of the curls above non-200,
      # this step routes 100% traffic back to the previous Cloud Run
      # revision so users see the old (working) version while we debug.
      # ──────────────────────────────────────────────────────────────────
      - name: Roll back backend on smoke test failure
        if: failure() && steps.smoke.conclusion == 'failure' && env.PREVIOUS_BACKEND_REVISION != ''
        run: |
          echo "Smoke test failed. Rolling back ${{ env.BACKEND_SERVICE }} to $PREVIOUS_BACKEND_REVISION"
          gcloud run services update-traffic ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --to-revisions=$PREVIOUS_BACKEND_REVISION=100
          echo "Rollback complete. Traffic now serving from $PREVIOUS_BACKEND_REVISION"
          exit 1  # keep the workflow red so the alert fires
