# CupCast Deploy Pipeline
# Triggers on: push to main (after PR merge).
# Builds Docker images, pushes to GCP Artifact Registry, deploys to Cloud Run.
#
# Production topology:
#   - Supabase Postgres (managed) ← backend connects via DATABASE_URL
#   - FastAPI backend on Cloud Run
#   - React + Nginx frontend on Cloud Run (container listens on 8080)
#   - MLflow tracking server on GCP VM (set MLFLOW_TRACKING_URI secret)
#
# Required GitHub secrets:
#   GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#   DATABASE_URL                  — Supabase Postgres connection string
#   ADMIN_API_KEY                 — protects POST /api/v1/admin/*
#   MLFLOW_TRACKING_URI           — http://<GCP_VM_IP>:5000 (admin/training only)
#   API_FOOTBALL_KEYS             — comma-separated api-sports.io keys
#   FOOTBALL_DATA_ORG_API_KEY     — Football-Data.org free-tier key
#   GCS_BUCKET                    — bucket holding trained model artifacts
#   GCS_MODEL_URI_CLUB            — gs:// path to registered club model (from ml/register_models.py)
#   GCS_MODEL_URI_CLUB_TOP5       — gs:// path to registered top-5 club model
#   GCS_MODEL_URI_INTL            — gs:// path to registered international model
#   VITE_API_URL                  — public backend URL baked into the frontend build

name: Deploy

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-west1
  ARTIFACT_REGISTRY: us-west1-docker.pkg.dev
  BACKEND_SERVICE: cupcast-backend
  FRONTEND_SERVICE: cupcast-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP using Workload Identity Federation (no long-lived keys)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      # Backend build context is the repo root so the Dockerfile can COPY ml/
      # alongside backend/. The -f flag selects the Dockerfile.
      - name: Build and push backend image
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cupcast/${{ env.BACKEND_SERVICE }}:${{ github.sha }}"
          docker build -f backend/Dockerfile -t $IMAGE .
          docker push $IMAGE
          echo "BACKEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build and push frontend image
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cupcast/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}"
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -f frontend/Dockerfile -t $IMAGE frontend/
          docker push $IMAGE
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image ${{ env.BACKEND_IMAGE }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=production \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --set-env-vars ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }} \
            --set-env-vars MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }} \
            --set-env-vars GCS_MODEL_URI_CLUB=${{ secrets.GCS_MODEL_URI_CLUB }} \
            --set-env-vars GCS_MODEL_URI_CLUB_TOP5=${{ secrets.GCS_MODEL_URI_CLUB_TOP5 }} \
            --set-env-vars GCS_MODEL_URI_INTL=${{ secrets.GCS_MODEL_URI_INTL }} \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars GCS_BUCKET=${{ secrets.GCS_BUCKET }} \
            --set-env-vars API_FOOTBALL_KEYS=${{ secrets.API_FOOTBALL_KEYS }} \
            --set-env-vars FOOTBALL_DATA_ORG_API_KEY=${{ secrets.FOOTBALL_DATA_ORG_API_KEY }} \
            --set-env-vars ENABLE_SCHEDULER=false \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.FRONTEND_IMAGE }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 2

      - name: Smoke test backend
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          curl -f "${BACKEND_URL}/health" || exit 1
