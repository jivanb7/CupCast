# CupCast Data Refresh + Retrain Pipeline
# Trigger: Monday 5AM UTC = Sunday 9PM PST (note: stays at 9PM during PST,
# becomes 10PM during PDT — GitHub Actions cron is UTC-only and not DST-aware)
# Also: manual trigger via workflow_dispatch
#
# Steps:
#   1. Download latest CSVs from all sources
#   2. Process and update database
#   3. Re-run feature engineering
#   4. Retrain models (both club and international)
#   5. Run the promotion gate: register the new training run as a new
#      version, compare val_log_loss against the current @prod version,
#      and flip the @prod alias only if new is at least 1% better. This
#      prevents a noisy retrain from silently degrading serving quality.
#   6. Regenerate predictions for upcoming matches against the (possibly
#      updated) prod model.
#
# NOTE: This job runs for 30-60+ minutes. Timeout set to 90 minutes.
# If the job fails partway, re-run from the last successful step using
# workflow_dispatch with step parameter.

name: Data Refresh

on:
  schedule:
    - cron: "0 5 * * 1"  # Monday 5AM UTC = Sunday 9PM PST
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - data-only
          - predict-only
          - train-only
      promote_margin:
        description: "Required relative improvement to promote (0.0 = any improvement, 0.01 = 1%)"
        required: false
        # Default 0.0 — our model family lives in val_log_loss 1.000–1.080,
        # a 1% margin (0.01 absolute) gets rejected by run-to-run variance
        # so legitimate fresh-data improvements never promoted. Override
        # via workflow_dispatch input if churn becomes a problem.
        default: "0.0"
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Required for Workload Identity Federation auth to GCP. Without this
    # `permissions: id-token: write` the google-github-actions/auth step
    # below fails to mint a JWT and downstream GCS calls run anonymously,
    # which breaks every mlflow.*.log_model() upload.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Authenticate to GCP via Workload Identity Federation. MLflow's
      # tracking server stores artifacts in gs:// — without this auth step
      # `mlflow.xgboost.log_model` (and friends) fails with
      # "Anonymous credentials cannot be refreshed" mid-training.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install ML + backend dependencies
        # Backend deps (pydantic_settings, FastAPI, etc.) are needed by
        # scripts/refresh_and_export_player_features.py which imports
        # backend.services.player_availability_service. Without them
        # that step crashed on `from pydantic_settings import …` and
        # fell back silently (continue-on-error) so injury/availability
        # data was empty for training.
        run: pip install -r ml/requirements.txt -r backend/requirements.txt

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      # Refresh API-Football top scorers + injuries into the prod DB AND
      # export the resulting per-team snapshots to the parquets that
      # ml/src/feature_engineering reads. Costs ~200 API requests against
      # the 7500/day quota — well within budget. Runs before the pipeline
      # so feature engineering picks up fresh availability + injury data.
      - name: Refresh + export player features (top scorers, injuries, availability)
        if: ${{ github.event.inputs.mode == null || github.event.inputs.mode == 'full' || github.event.inputs.mode == 'data-only' }}
        run: |
          python scripts/refresh_and_export_player_features.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEYS: ${{ secrets.API_FOOTBALL_KEYS }}
          PYTHONPATH: backend:ml:.
        continue-on-error: true  # availability is enrichment, not load-bearing

      - name: Run pipeline (ingest → process → features → train)
        id: pipeline
        run: |
          python ml/run_pipeline.py --mode ${{ github.event.inputs.mode || 'full' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          # MLflow client reads these for basic auth against the Caddy-fronted
          # tracking server — without them, create_model_version/set_alias
          # return 401 and the gate step will hard-fail.
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          FOOTBALL_DATA_ORG_API_KEY: ${{ secrets.FOOTBALL_DATA_ORG_API_KEY }}
          # Needed by odds_service + player_availability_service during ingestion.
          API_FOOTBALL_KEYS: ${{ secrets.API_FOOTBALL_KEYS }}
          PYTHONPATH: .

      # Promotion gate runs only when training actually happened. A 'data-only'
      # or 'predict-only' manual run should skip it — nothing new to promote.
      - name: Promote new club model if better (val_accuracy)
        if: ${{ github.event.inputs.mode == null || github.event.inputs.mode == 'full' || github.event.inputs.mode == 'train-only' }}
        run: |
          python scripts/promote_if_better.py \
            --model-type club \
            --metric val_accuracy \
            --margin ${{ github.event.inputs.promote_margin || '0.0' }}
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          # Promotion gate writes a row to the model_registry table on
          # successful flip so the /model header can show 'v0.2.0 ·
          # CatBoost'. Without DATABASE_URL the alias still flips but
          # the label stays as 'v0.1.0-dev'.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: .

      - name: Promote new international model if better (val_accuracy)
        if: ${{ github.event.inputs.mode == null || github.event.inputs.mode == 'full' || github.event.inputs.mode == 'train-only' }}
        run: |
          python scripts/promote_if_better.py \
            --model-type intl \
            --metric val_accuracy \
            --margin ${{ github.event.inputs.promote_margin || '0.0' }}
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          # Promotion gate writes a row to the model_registry table on
          # successful flip so the /model header can show 'v0.2.0 ·
          # CatBoost'. Without DATABASE_URL the alias still flips but
          # the label stays as 'v0.1.0-dev'.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: .

      # Kick the backend to regenerate predictions against whatever @prod
      # resolves to now. Without this, prediction rows for upcoming matches
      # stay stale until the daily cupcast-generate-predictions cron runs.
      #
      # URL is resolved via gcloud (the runner is already authenticated
      # via WIF) instead of a BACKEND_URL secret. Previously the secret
      # could be missing/empty and the step would silently skip — which is
      # exactly what happened in attempt 14 (model promoted but predictions
      # never updated). gcloud-derived URL is always current and never
      # depends on a manually-managed secret.
      - name: Regenerate predictions on Cloud Run
        if: ${{ github.event.inputs.mode == null || github.event.inputs.mode == 'full' || github.event.inputs.mode == 'train-only' || github.event.inputs.mode == 'predict-only' }}
        run: |
          set -e
          backend=$(gcloud run services describe cupcast-backend \
            --region=us-west1 \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -z "$backend" ]; then
            echo "::error::Could not resolve cupcast-backend Cloud Run URL — predictions will refresh on next scheduled run instead"
            exit 1
          fi
          echo "Resolved backend URL: $backend"
          curl -fsS -X POST \
            -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 480 \
            "$backend/api/v1/admin/predictions/generate"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Data refresh / retrain pipeline FAILED. Check logs."
          # TODO (devops-engineer): add Slack webhook notification here
