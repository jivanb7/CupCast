# CupCast CI Pipeline
# Triggers on: push to any branch, pull request to main
# Steps: lint → test → build Docker images
#
# Build contexts:
#   backend/Dockerfile and ml/Dockerfile both expect the repo root as their
#   build context so they can COPY ml/ into the image. The -f flag selects
#   the Dockerfile while the trailing "." stays the context.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check ml/src/ backend/
      - run: ruff format --check ml/src/ backend/

  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r ml/requirements.txt pytest
      - run: pytest ml/tests/ -v
        env:
          PYTHONPATH: .

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt pytest
      # Tests live in repo-root tests/, not backend/tests/.
      - run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite://
          ADMIN_API_KEY: test-key
          PYTHONPATH: backend:ml:.

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm run lint

  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-python, test-ml, test-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t cupcast-backend:test .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t cupcast-frontend:test frontend/
      - name: Build ML image
        run: docker build -f ml/Dockerfile -t cupcast-ml:test .
